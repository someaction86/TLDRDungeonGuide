name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package and release to GitHub
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to CurseForge
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          ZIP=".release/TLDRDungeonGuide-${TAG}.zip"
          METADATA=$(printf '{"changelog":"%s","changelogType":"markdown","gameVersions":[14422,15855],"releaseType":"release"}' "$TAG")
          echo "Uploading $ZIP to CurseForge..."
          curl --fail -X POST \
            -H "X-Api-Token: ${CF_API_KEY}" \
            -F "metadata=${METADATA}" \
            -F "file=@${ZIP}" \
            "https://wow.curseforge.com/api/projects/1477038/upload-file"
