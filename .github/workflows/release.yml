name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package and release to GitHub
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Get CurseForge game version ID
        run: |
          curl -s \
            -H "X-Api-Token: ${{ secrets.CF_API_KEY }}" \
            "https://wow.curseforge.com/api/game/versions" \
            | python3 -c "
import sys, json
versions = json.load(sys.stdin)
for v in versions:
    if '12.0' in v.get('name','') or '12.0' in v.get('slug',''):
        print(v)
"

      - name: Upload to CurseForge
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          ZIP=".release/TLDRDungeonGuide-${TAG}.zip"
          echo "Uploading $ZIP to CurseForge..."
          curl --fail -X POST \
            -H "X-Api-Token: ${{ secrets.CF_API_KEY }}" \
            -F "metadata={\"changelog\":\"${TAG}\",\"gameVersions\":[12319],\"releaseType\":\"release\"}" \
            -F "file=@${ZIP}" \
            "https://wow.curseforge.com/api/projects/1477038/upload-file"
